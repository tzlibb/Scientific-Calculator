<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#1e1e1e;
    font-family:Arial,sans-serif;
}

.calculator{
    background:#2d2d2d;
    padding:20px;
    border-radius:15px;
    width:420px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#display{
    width:100%;
    height:60px;
    font-size:28px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    background:#111;
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    height:55px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    background:#444;
    color:white;
}

button:hover{
    background:#666;
}

.operator{
    background:#ff9500;
}

.operator:hover{
    background:#ffb340;
}

.equal{
    background:#28a745;
}

.equal:hover{
    background:#34d058;
}
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="sqrt()">√</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="power()">x²</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="sin()">sin</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="log()">log</button>
        <button onclick="cos()">cos</button>
        <button class="equal" onclick="calculate()">=</button>

        <button onclick="tan()">tan</button>
        <button onclick="ln()">ln</button>
        <button onclick="factorial()">n!</button>
        <button onclick="pi()">π</button>
        <button onclick="eValue()">e</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Error";
    }
}

function sqrt(){
    display.value = Math.sqrt(eval(display.value));
}

function power(){
    display.value = Math.pow(eval(display.value),2);
}

function sin(){
    display.value = Math.sin(eval(display.value) * Math.PI / 180);
}

function cos(){
    display.value = Math.cos(eval(display.value) * Math.PI / 180);
}

function tan(){
    display.value = Math.tan(eval(display.value) * Math.PI / 180);
}

function log(){
    display.value = Math.log10(eval(display.value));
}

function ln(){
    display.value = Math.log(eval(display.value));
}

function pi(){
    display.value += Math.PI;
}

function eValue(){
    display.value += Math.E;
}

function factorial(){
    let n = parseInt(eval(display.value));

    if(n < 0){
        display.value = "Error";
        return;
    }

    let result = 1;

    for(let i = 2; i <= n; i++){
        result *= i;
    }

    display.value = result;
}
</script>

</body>
</html>
